simulation:
  max_steps: 100
  initial_inventory: 500
  base_demand: 50
  price_elasticity: 1.5
  memory_beta: 0.1
  demand_noise: 2.0
  seed: 42

ppo:
  learning_rate: 0.0003
  gamma: 0.99
  clip_epsilon: 0.2
  c1: 0.5
  c2: 0.01
  epochs: 10
  batch_size: 32

dqn:
  learning_rate: 0.0005
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  target_update_freq: 10
  memory_size: 10000
  batch_size: 64

training:
  episodes: 300
  eval_frequency: 20
